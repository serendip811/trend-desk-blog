<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">기초생활보장 직권신청 체크리스트</title>
  <desc id="desc">기초생활보장 직권신청의 현재 기준과 상담 전 확인할 점을 정리한 한국어 안내 이미지</desc>
  <rect width="1200" height="630" fill="#eef3f1"/>
  <rect x="44" y="44" width="1112" height="542" rx="30" fill="#fbfffd" stroke="#b8cbc3" stroke-width="4"/>
  <text x="82" y="122" fill="#24453c" font-size="46" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">기초생활보장 직권신청 체크리스트</text>
  <text x="82" y="168" fill="#58766d" font-size="24" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">현재 가능한 절차와 앞으로 검토 중인 변화는 나눠서 확인해야 합니다.</text>
  <rect x="82" y="220" width="310" height="270" rx="22" fill="#e8f4ee"/>
  <rect x="445" y="220" width="310" height="270" rx="22" fill="#fff4dc"/>
  <rect x="808" y="220" width="310" height="270" rx="22" fill="#edf1ff"/>
  <text x="112" y="275" fill="#1f5a47" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">현재 기준</text>
  <text x="112" y="325" fill="#2c3935" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 공무원 직권신청 가능</text>
  <text x="112" y="365" fill="#2c3935" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 금융정보 동의 절차 존재</text>
  <text x="112" y="405" fill="#2c3935" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 조사와 급여결정 별도 진행</text>
  <text x="475" y="275" fill="#7c5a11" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">상담 때 챙길 것</text>
  <text x="475" y="325" fill="#39342c" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 신청서와 동의서</text>
  <text x="475" y="365" fill="#39342c" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 임대차·소득·재산 자료</text>
  <text x="475" y="405" fill="#39342c" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 위기 상황 설명</text>
  <text x="838" y="275" fill="#304f88" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">최근 검토 방향</text>
  <text x="838" y="325" fill="#2f3440" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 서면동의 없는 직권신청 검토</text>
  <text x="838" y="365" fill="#2f3440" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 공무원 면책 방안 검토</text>
  <text x="838" y="405" fill="#2f3440" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 법 개정 포함 절차 검토</text>
  <text x="82" y="545" fill="#58766d" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">실제 시행 범위는 최신 법령과 행정지침, 읍면동 안내를 다시 확인해야 합니다.</text>
</svg>
