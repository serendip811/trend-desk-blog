<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">2026 여행가는 봄 혜택 확인 체크리스트</title>
  <desc id="desc">공식 페이지를 먼저 보고 날짜, 대상, 중복 조건, 결제 직전 재확인을 거치는 순서를 보여주는 설명 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#f2f7ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1d2b4a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="120" fill="#ffd9a8" opacity="0.45"/>
  <circle cx="160" cy="680" r="150" fill="#bfe2ff" opacity="0.35"/>
  <rect x="120" y="90" width="960" height="620" rx="40" fill="url(#card)" filter="url(#shadow)"/>
  <text x="170" y="180" fill="#13233d" font-size="54" font-family="Arial, sans-serif" font-weight="700">2026 여행가는 봄</text>
  <text x="170" y="232" fill="#475569" font-size="28" font-family="Arial, sans-serif">혜택을 찾는 순서</text>

  <g transform="translate(170 290)">
    <rect width="260" height="120" rx="24" fill="#fff4d8" stroke="#f0c36b"/>
    <text x="30" y="52" fill="#7a4b00" font-size="26" font-family="Arial, sans-serif" font-weight="700">1 공식 공지 확인</text>
    <text x="30" y="86" fill="#7a4b00" font-size="20" font-family="Arial, sans-serif">행사명 · 날짜 · 대상</text>

    <path d="M282 60h52" stroke="#8aa3bf" stroke-width="8" stroke-linecap="round"/>
    <path d="M322 42l18 18-18 18" fill="none" stroke="#8aa3bf" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="360" width="260" height="120" rx="24" fill="#e9f4ff" stroke="#90bfe8"/>
    <text x="390" y="52" fill="#0f4c81" font-size="26" font-family="Arial, sans-serif" font-weight="700">2 발급·사용 기간</text>
    <text x="390" y="86" fill="#0f4c81" font-size="20" font-family="Arial, sans-serif">쿠폰과 투숙 기간 분리</text>

    <path d="M642 60h52" stroke="#8aa3bf" stroke-width="8" stroke-linecap="round"/>
    <path d="M682 42l18 18-18 18" fill="none" stroke="#8aa3bf" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="720" width="260" height="120" rx="24" fill="#eefbe9" stroke="#9dd39b"/>
    <text x="750" y="52" fill="#246b2c" font-size="26" font-family="Arial, sans-serif" font-weight="700">3 중복 조건 확인</text>
    <text x="750" y="86" fill="#246b2c" font-size="20" font-family="Arial, sans-serif">카드 · 지역 · 회원 조건</text>
  </g>

  <g transform="translate(260 470)">
    <rect width="680" height="120" rx="24" fill="#fff" stroke="#d7dee8" stroke-width="2"/>
    <text x="36" y="50" fill="#13233d" font-size="28" font-family="Arial, sans-serif" font-weight="700">4 예약 직전 다시 확인</text>
    <text x="36" y="86" fill="#475569" font-size="22" font-family="Arial, sans-serif">선착순 · 예산 소진 · 취소 후 재발급 · 최종 결제 금액</text>
  </g>
</svg>
