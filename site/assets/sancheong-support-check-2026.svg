<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">산청군 민생안정지원금 확인 순서</title>
  <desc id="desc">산청군 민생안정지원금을 확인할 때 조례, 담당부서, 공고를 보는 순서를 정리한 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6efe7"/>
      <stop offset="100%" stop-color="#e4efe9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="60" y="58" width="1080" height="514" rx="30" fill="#fffdfa"/>
  <text x="92" y="126" fill="#3c3b2a" font-size="44" font-weight="700">산청군 민생안정지원금 확인 순서</text>
  <text x="92" y="166" fill="#6d6a58" font-size="24">기사보다 먼저 공식 근거와 담당부서, 최신 공고를 확인</text>

  <g fill="#2f473a" font-size="30" font-weight="700">
    <line x1="200" y1="318" x2="1000" y2="318" stroke="#d5d0c2" stroke-width="8" stroke-linecap="round"/>
    <circle cx="200" cy="318" r="58" fill="#dfeadc"/>
    <text x="160" y="325">조례</text>
    <text x="126" y="394" font-size="22" font-weight="500" fill="#596558">의회 회의록에서</text>
    <text x="126" y="424" font-size="22" font-weight="500" fill="#596558">근거 확인</text>

    <circle cx="600" cy="318" r="58" fill="#ece7d6"/>
    <text x="545" y="325">담당</text>
    <text x="520" y="394" font-size="22" font-weight="500" fill="#596558">경제기업과</text>
    <text x="500" y="424" font-size="22" font-weight="500" fill="#596558">연락처 확인</text>

    <circle cx="1000" cy="318" r="58" fill="#e1ece8"/>
    <text x="960" y="325">공고</text>
    <text x="930" y="394" font-size="22" font-weight="500" fill="#596558">군청 최신</text>
    <text x="922" y="424" font-size="22" font-weight="500" fill="#596558">신청안내 확인</text>
  </g>

  <text x="92" y="520" fill="#5b645f" font-size="24">금액, 대상, 신청일은 변동될 수 있으므로 접수 직전 재확인이 필요합니다</text>
</svg>
