<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ChatGPT pricing guide illustration</title>
  <desc id="desc">Illustration of ChatGPT Free, Go, Plus, Pro, Business, and Enterprise plans.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8efe4" />
      <stop offset="100%" stop-color="#f2dcc7" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8" />
      <stop offset="100%" stop-color="#f9f3ea" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" rx="36" />
  <circle cx="185" cy="130" r="120" fill="#efd5c7" opacity="0.8" />
  <circle cx="1040" cy="580" r="150" fill="#e9c2ad" opacity="0.45" />
  <rect x="110" y="115" width="980" height="490" rx="34" fill="#fffaf3" opacity="0.94" />
  <text x="170" y="198" font-family="SUIT, Arial, sans-serif" font-size="28" font-weight="700" fill="#a24f2a">DIGITAL GUIDE</text>
  <text x="170" y="252" font-family="Noto Serif KR, Georgia, serif" font-size="54" font-weight="700" fill="#1f2328">ChatGPT 요금제 한눈에 보기</text>
  <text x="170" y="304" font-family="SUIT, Arial, sans-serif" font-size="28" fill="#5f5a53">무료부터 Enterprise까지, 내 사용 패턴에 맞는 구간만 먼저 고르기</text>

  <g transform="translate(165 352)">
    <rect width="165" height="160" rx="22" fill="url(#card)" stroke="#d7b9a6" />
    <text x="22" y="40" font-family="SUIT, Arial, sans-serif" font-size="24" font-weight="700" fill="#a24f2a">Free</text>
    <text x="22" y="78" font-family="SUIT, Arial, sans-serif" font-size="21" fill="#1f2328">가볍게 시작</text>
    <text x="22" y="112" font-family="SUIT, Arial, sans-serif" font-size="17" fill="#6c6a63">체험, 간단 질문</text>
  </g>
  <g transform="translate(350 352)">
    <rect width="165" height="160" rx="22" fill="#fff8ef" stroke="#a24f2a" stroke-width="3" />
    <text x="22" y="40" font-family="SUIT, Arial, sans-serif" font-size="24" font-weight="700" fill="#a24f2a">Go</text>
    <text x="22" y="78" font-family="SUIT, Arial, sans-serif" font-size="21" fill="#1f2328">가성비 구간</text>
    <text x="22" y="112" font-family="SUIT, Arial, sans-serif" font-size="17" fill="#6c6a63">개인용 여유 사용</text>
  </g>
  <g transform="translate(535 352)">
    <rect width="165" height="160" rx="22" fill="url(#card)" stroke="#d7b9a6" />
    <text x="22" y="40" font-family="SUIT, Arial, sans-serif" font-size="24" font-weight="700" fill="#a24f2a">Plus</text>
    <text x="22" y="78" font-family="SUIT, Arial, sans-serif" font-size="21" fill="#1f2328">개인 생산성</text>
    <text x="22" y="112" font-family="SUIT, Arial, sans-serif" font-size="17" fill="#6c6a63">파일, 이미지, 프로젝트</text>
  </g>
  <g transform="translate(720 352)">
    <rect width="165" height="160" rx="22" fill="url(#card)" stroke="#d7b9a6" />
    <text x="22" y="40" font-family="SUIT, Arial, sans-serif" font-size="24" font-weight="700" fill="#a24f2a">Pro</text>
    <text x="22" y="78" font-family="SUIT, Arial, sans-serif" font-size="21" fill="#1f2328">최상위 개인용</text>
    <text x="22" y="112" font-family="SUIT, Arial, sans-serif" font-size="17" fill="#6c6a63">고사용량, 우선 속도</text>
  </g>
  <g transform="translate(905 352)">
    <rect width="165" height="160" rx="22" fill="url(#card)" stroke="#d7b9a6" />
    <text x="22" y="40" font-family="SUIT, Arial, sans-serif" font-size="24" font-weight="700" fill="#a24f2a">Business</text>
    <text x="22" y="78" font-family="SUIT, Arial, sans-serif" font-size="21" fill="#1f2328">팀 협업</text>
    <text x="22" y="112" font-family="SUIT, Arial, sans-serif" font-size="17" fill="#6c6a63">관리, 보안, 연결</text>
  </g>
  <g transform="translate(625 530)">
    <rect x="-230" width="460" height="72" rx="18" fill="#f7ede1" stroke="#e0c9b5" />
    <text x="-202" y="45" font-family="SUIT, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2328">Enterprise</text>
    <text x="-40" y="45" font-family="SUIT, Arial, sans-serif" font-size="20" fill="#5f5a53">대규모 보안 통제와 계약형 지원</text>
  </g>
  <text x="170" y="612" font-family="SUIT, Arial, sans-serif" font-size="18" fill="#6c6a63">가격은 국가와 결제 방식에 따라 달라질 수 있으니 공식 가격 페이지를 다시 확인하세요.</text>
</svg>
