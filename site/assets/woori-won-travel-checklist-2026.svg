<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">우리WON트래블 사용 전 체크리스트</title>
  <desc id="desc">우리WON트래블 예약 전 확인할 기능과 해외이용 설정을 정리한 한국어 안내 이미지</desc>
  <rect width="1200" height="630" fill="#eef6fb"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#fdfefe" stroke="#b7cfdd" stroke-width="4"/>
  <text x="78" y="122" fill="#21485f" font-size="46" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">우리WON트래블 사용 전 체크리스트</text>
  <text x="78" y="168" fill="#5f7f92" font-size="24" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">예약 기능보다 먼저 카드 해외사용 상태와 결제수단 연결을 확인하세요.</text>
  <rect x="78" y="220" width="320" height="270" rx="22" fill="#e8f4ff"/>
  <rect x="440" y="220" width="320" height="270" rx="22" fill="#fff2df"/>
  <rect x="802" y="220" width="320" height="270" rx="22" fill="#eef8ec"/>
  <text x="108" y="275" fill="#225b86" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">공식 기능</text>
  <text x="108" y="325" fill="#2b3944" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 항공권 변경·취소</text>
  <text x="108" y="365" fill="#2b3944" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 좌석 지정</text>
  <text x="108" y="405" fill="#2b3944" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 추가 수하물 사전 구매</text>
  <text x="470" y="275" fill="#82571f" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">출국 전 설정</text>
  <text x="470" y="325" fill="#3c372f" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 해외사용정지 해제</text>
  <text x="470" y="365" fill="#3c372f" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 원화결제차단 확인</text>
  <text x="470" y="405" fill="#3c372f" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 결제수단 추가</text>
  <text x="832" y="275" fill="#326226" font-size="28" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-weight="700">ATM 사용 조건</text>
  <text x="832" y="325" fill="#2f3c2d" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 현금겸용카드 등록</text>
  <text x="832" y="365" fill="#2f3c2d" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 우리은행 결제계좌 카드</text>
  <text x="832" y="405" fill="#2f3c2d" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">• 최신 조건 재확인</text>
  <text x="78" y="545" fill="#5f7f92" font-size="22" font-family="'Apple SD Gothic Neo','Noto Sans KR',sans-serif">항공권 기능과 적립 조건은 항공사와 우리카드 공지에 따라 수시로 달라질 수 있습니다.</text>
</svg>
