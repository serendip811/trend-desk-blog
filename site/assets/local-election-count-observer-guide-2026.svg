<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">개표참관인 신청 체크리스트</title>
  <desc id="desc">지방선거 일정과 지역 선관위 공고, 본인인증 준비를 순서대로 확인하는 안내 이미지</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f8ff"/>
      <stop offset="100%" stop-color="#eef8f2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbfdff"/>
    </linearGradient>
    <style>
      .title { font: 700 42px/1.2 sans-serif; fill: #132238; }
      .subtitle { font: 400 22px/1.5 sans-serif; fill: #4b5563; }
      .label { font: 700 24px/1.2 sans-serif; fill: #132238; }
      .body { font: 400 20px/1.5 sans-serif; fill: #334155; }
      .small { font: 600 18px/1.4 sans-serif; fill: #667085; }
      .chip { font: 700 18px/1 sans-serif; fill: #f8fafc; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="1020" cy="120" r="92" fill="#dce7ff" opacity=".8"/>
  <circle cx="154" cy="592" r="106" fill="#dff3e6" opacity=".78"/>

  <text x="80" y="104" class="title">개표참관인 신청 전 체크리스트</text>
  <text x="80" y="148" class="subtitle">신청 버튼보다 먼저 선거 일정, 지역 공고, 본인인증 준비를 확인하세요.</text>

  <rect x="80" y="210" width="1040" height="380" rx="28" fill="url(#card)" stroke="#d8e2ef"/>

  <rect x="120" y="270" width="280" height="240" rx="24" fill="#eef5ff" stroke="#c8d8f3"/>
  <text x="150" y="320" class="label">1. 선거 일정 확인</text>
  <text x="150" y="362" class="body">2026년 6월 3일</text>
  <text x="150" y="400" class="body">사전투표 5월 29~30일</text>
  <text x="150" y="452" class="small">공식 일정부터 먼저 보기</text>

  <rect x="460" y="270" width="280" height="240" rx="24" fill="#f0fbf2" stroke="#c7e6cf"/>
  <text x="490" y="320" class="label">2. 지역 공고 확인</text>
  <text x="490" y="362" class="body">내 지역 선관위 공지</text>
  <text x="490" y="400" class="body">모집 인원·기간 확인</text>
  <text x="490" y="452" class="small">지역별 조건은 다를 수 있음</text>

  <rect x="800" y="270" width="280" height="240" rx="24" fill="#fff7ea" stroke="#f0d7ad"/>
  <text x="830" y="320" class="label">3. 신청 준비</text>
  <text x="830" y="362" class="body">휴대폰 본인인증</text>
  <text x="830" y="400" class="body">문의 전화 정리</text>
  <text x="830" y="452" class="small">접수 직전 다시 확인</text>

  <rect x="402" y="610" width="396" height="56" rx="28" fill="#132238"/>
  <text x="600" y="647" text-anchor="middle" class="chip">일정 확인 → 지역 공고 → 본인인증 준비</text>
</svg>
